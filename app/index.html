<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="BizCore — Business Operating System: HRM, CRM & AI Copilot cho doanh nghiệp Việt">
  <title>BizCore — Business Operating System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/variables.css?v=6">
  <link rel="stylesheet" href="css/base.css?v=6">
  <link rel="stylesheet" href="css/layout.css?v=6">
  <link rel="stylesheet" href="css/components.css?v=6">
  <link rel="stylesheet" href="css/pages.css?v=6">
  <link rel="stylesheet" href="css/ai.css?v=6">
  <link rel="stylesheet" href="css/effects.css?v=6">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230c6b57'/><circle cx='16' cy='16' r='3' fill='white'/><circle cx='8' cy='9' r='2' fill='white' opacity='.8'/><circle cx='24' cy='9' r='2' fill='white' opacity='.8'/><circle cx='9' cy='23' r='2' fill='white' opacity='.8'/><path d='M16 16L8 9M16 16l8-7M16 16l-7 7' stroke='white' stroke-width='1.3' opacity='.6'/></svg>">
</head>
<body>
  <!-- reusable logo mark: neural core -->
  <svg width="0" height="0" style="position:absolute"><defs>
    <symbol id="cortexMark" viewBox="0 0 24 24">
      <path d="M12 12L6.5 7.5M12 12l5.5-4.5M12 12l-4.5 5.5M12 12l5 5" stroke="currentColor" stroke-width="1.4" opacity=".65"/>
      <circle cx="12" cy="12" r="2.6" fill="currentColor"/>
      <circle cx="6.2" cy="7.2" r="1.7" fill="currentColor" opacity=".9"/>
      <circle cx="17.8" cy="7.2" r="1.7" fill="currentColor" opacity=".9"/>
      <circle cx="7.2" cy="17.6" r="1.7" fill="currentColor" opacity=".9"/>
      <circle cx="17.2" cy="17.2" r="1.7" fill="currentColor" opacity=".9"/>
    </symbol>
  </defs></svg>

  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">
          <div class="logo-icon"><svg viewBox="0 0 24 24" width="22" height="22" style="color:#fff"><use href="#cortexMark"/></svg></div>
          <span class="logo-text">Biz<b>Core</b></span>
        </div>
      </div>
      <nav class="sidebar-nav">
        <a class="sidebar-nav-item active" data-page="dashboard" href="#/dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
          <span class="nav-label">Trung tâm điều hành</span>
        </a>
        <a class="sidebar-nav-item" data-page="employees" href="#/employees">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span class="nav-label">Nhân sự</span>
        </a>
        <a class="sidebar-nav-item" data-page="departments" href="#/departments">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          <span class="nav-label">Phòng ban</span>
        </a>
        <a class="sidebar-nav-item" data-page="attendance" href="#/attendance">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span class="nav-label">Chấm công</span>
        </a>
        <a class="sidebar-nav-item" data-page="payroll" href="#/payroll">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          <span class="nav-label">Bảng lương</span>
        </a>
        <a class="sidebar-nav-item" data-page="reports" href="#/reports">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          <span class="nav-label">Báo cáo</span>
        </a>
        <div class="sidebar-section-label"><span>CRM</span></div>
        <a class="sidebar-nav-item" data-page="customers" href="#/customers">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span class="nav-label">Khách hàng</span>
        </a>
        <a class="sidebar-nav-item" data-page="deals" href="#/deals">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
          <span class="nav-label">Cơ hội</span>
        </a>
        <div class="sidebar-section-label"><span>Trí tuệ</span></div>
        <a class="sidebar-nav-item nav-ai" data-page="simulator" href="#/simulator">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 3l2.2 5.5L20 10l-5.8 1.5L12 17l-2.2-5.5L4 10l5.8-1.5z"/></svg>
          <span class="nav-label">Mô phỏng What-If</span>
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="user-avatar-sm" id="sidebarAvatar">AD</div>
          <div class="user-info">
            <div class="user-name" id="sidebarName">Admin</div>
            <div class="user-role" id="sidebarRole">Quản trị viên</div>
          </div>
          <button id="btnLogout" class="btn-logout" title="Đăng xuất">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="17" height="17"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main-content">
      <header class="header" id="header">
        <div class="header-left">
          <button class="mobile-toggle btn-icon" id="mobileToggle" aria-label="Menu">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div class="header-title" id="headerTitle"><h2>Trung tâm điều hành</h2></div>
        </div>
        <div class="header-right">
          <div class="header-search">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" width="16" height="16"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" placeholder="Tìm nhân sự, khách hàng, cơ hội…" id="globalSearch">
            <kbd>⌘K</kbd>
          </div>
          <button class="notification-btn btn-icon" id="notificationBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" width="19" height="19"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span class="notification-badge">3</span>
          </button>
          <div class="user-avatar" id="userAvatar">AD</div>
        </div>
      </header>
      <div class="content-area" id="contentArea"></div>
    </main>
  </div>

  <div id="modalContainer"></div>

  <!-- Login Overlay -->
  <div id="loginOverlay" class="login-overlay hidden">
    <div class="login-bg" aria-hidden="true"><span></span><span></span><span></span></div>
    <div class="login-card">
      <div class="login-brandrow">
        <div class="logo-icon"><svg viewBox="0 0 24 24" width="24" height="24" style="color:#fff"><use href="#cortexMark"/></svg></div>
        <span class="logo-text">Biz<b>Core</b></span>
      </div>
      <div class="login-kick">Chào mừng trở lại</div>
      <h2 class="shiny-text">Đăng nhập hệ thống</h2>
      <p class="login-sub">BizCore giúp bạn <span class="login-tw" data-typewriter="điều hành nhân sự & lương|quản trị khách hàng & cơ hội|mô phỏng quyết định tài chính|ra lệnh cho trợ lý AI"></span></p>
      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label class="form-label">Email công ty</label>
          <div class="input-wrap">
            <svg class="input-lead" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
            <input type="email" id="loginEmail" class="form-input" required placeholder="ten@congty.com">
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Mật khẩu</label>
          <div class="input-wrap">
            <svg class="input-lead" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="4" y="11" width="16" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
            <input type="password" id="loginPassword" class="form-input" required placeholder="••••••••">
            <span class="input-eye" id="pwToggle"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="17" height="17"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/></svg></span>
          </div>
        </div>
        <div id="loginError" class="form-error hidden"></div>
        <div class="login-row">
          <label class="login-check"><input type="checkbox" checked> Ghi nhớ đăng nhập</label>
          <a class="login-forgot">Quên mật khẩu?</a>
        </div>
        <button type="submit" class="btn btn-primary btn-block btn-shine">Đăng nhập</button>
      </form>
      <div class="login-hint">Phân quyền theo vai trò · RLS Supabase</div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="js/config.local.js"></script>
  <script src="js/utils.js?v=13"></script>
  <script src="js/supabase-store.js?v=13"></script>
  <script src="js/charts.js?v=13"></script>
  <script src="js/components.js?v=13"></script>
  <script src="js/pages/dashboard.js?v=13"></script>
  <script src="js/pages/employees.js?v=13"></script>
  <script src="js/pages/departments.js?v=13"></script>
  <script src="js/pages/attendance.js?v=13"></script>
  <script src="js/pages/payroll.js?v=13"></script>
  <script src="js/pages/customers.js?v=13"></script>
  <script src="js/pages/deals.js?v=13"></script>
  <script src="js/pages/reports.js?v=13"></script>
  <script src="js/pages/simulator.js?v=13"></script>
  <script src="js/app.js?v=13"></script>
  <script src="js/ai.js?v=13"></script>
  <script src="js/motion.js?v=13"></script>
  <script src="js/effects.js?v=6"></script>
  <script>
    document.addEventListener('click', function(e){
      var t = e.target.closest('#pwToggle');
      if(t){ var i=document.getElementById('loginPassword'); if(i) i.type = (i.type==='password'?'text':'password'); }
    });
  </script>
</body>
</html>
